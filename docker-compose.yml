services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8.6.3-alpine
    ports:
      - '${REDIS_PORT}:6379'

volumes:
  postgres-data:
